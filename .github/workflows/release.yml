name: Release & Build Attestation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Cross-Platform Binaries
        run: |
          mkdir -p dist/
          VERSION=${GITHUB_REF_NAME:-v0.0.1}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          
          # Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build $LDFLAGS -o dist/wowahaha-bnet-change-detector-windows-amd64.exe ./cmd/wowahaha-bnet-change-detector
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build $LDFLAGS -o dist/wowahaha-bnet-change-detector-windows-arm64.exe ./cmd/wowahaha-bnet-change-detector
          
          # Linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build $LDFLAGS -o dist/wowahaha-bnet-change-detector-linux-amd64 ./cmd/wowahaha-bnet-change-detector
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build $LDFLAGS -o dist/wowahaha-bnet-change-detector-linux-arm64 ./cmd/wowahaha-bnet-change-detector
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build $LDFLAGS -o dist/wowahaha-bnet-change-detector-linux-armv7 ./cmd/wowahaha-bnet-change-detector

          # Generate SHA256 checksums
          cd dist
          sha256sum * > checksums.txt
          cd ..

      - name: Attest Build Provenance of Release Binaries
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          allowUpdates: true
          draft: false
          prerelease: false
          generateReleaseNotes: true
