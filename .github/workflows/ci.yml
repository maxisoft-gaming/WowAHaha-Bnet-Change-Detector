name: CI & Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Verify Go Modules
        run: go mod verify

      - name: Run Unit Tests
        run: go test -v -race ./...

      - name: Build Binary Check
        run: go build ./cmd/bnet-change-detector
